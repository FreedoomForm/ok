name: Preview Check

on:
  pull_request:
    branches: [main]

concurrency:
  group: preview-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview-check:
    name: PR Quality Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Typecheck
        run: corepack yarn typecheck

      - name: Lint
        run: corepack yarn lint

      - name: Unit tests
        run: corepack yarn test

      # Vercel auto-creates preview deployments for PRs
      - name: Preview ready
        run: echo "✅ All checks passed — Vercel preview will be available"
