name: Secret Scan (gitleaks)

on:
  # Push/PR scanning is handled by the CI workflow (ci.yml → security job)
  # This standalone workflow is for manual audits and scheduled full-history scans
  schedule:
    # Weekly full history scan (Monday 06:00 UTC)
    - cron: '0 6 * * 1'
  # Allow manual trigger for secret rotation audits
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Detect leaked secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for baseline comparison

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Path to project-specific config
          GITLEAKS_CONFIG: .gitleaks.toml
