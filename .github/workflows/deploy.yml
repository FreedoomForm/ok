name: Deploy (Vercel)

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy Verification
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Verify build before deploy
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
          AUTH_SECRET: ci-auth-secret
          NEXTAUTH_SECRET: ci-nextauth-secret
          JWT_SECRET: ci-jwt-secret
        run: |
          corepack yarn typecheck
          corepack yarn build

      # Vercel auto-deploys from main, so this is just a verification gate
      - name: Deploy verification
        run: echo "✅ Build verified — Vercel will auto-deploy from main"
